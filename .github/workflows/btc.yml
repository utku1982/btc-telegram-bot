name: Bitcoin Telegram Raporu

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Fiyat cek ve gonder
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import os, urllib.request, urllib.parse, json
          from datetime import datetime, timezone

          url = "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd&include_24hr_change=true"
          data = json.loads(urllib.request.urlopen(url).read())

          def fmt(coin):
              p = data[coin]['usd']
              c = data[coin]['usd_24h_change']
              sign = '+' if c > 0 else ''
              return f"${p:,.2f}  {sign}{c:.2f}%"

          date = datetime.now(timezone.utc).strftime('%d %B %Y')
          msg = f"Gunluk Kripto Raporu\n{date} - 06:00 GMT\n\nBTC/USD: {fmt('bitcoin')}\nETH/USD: {fmt('ethereum')}\nSOL/USD: {fmt('solana')}\n\nkaynak: CoinGecko"

          params = urllib.parse.urlencode({"chat_id": os.environ["CHAT_ID"], "text": msg})
          req = urllib.request.Request(f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage", data=params.encode())
          urllib.request.urlopen(req)
          print("Gonderildi!")
          PYEOF
