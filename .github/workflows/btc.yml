name: Bitcoin Telegram Raporu

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Fiyat cek ve gonder
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATA=$(curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true&include_market_cap=true")
          PRICE=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin)['bitcoin']; print(f\"{d['usd']:,.2f}\")")
          CHANGE=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin)['bitcoin']; c=d['usd_24h_change']; print(f\"{'+'if c>0 else ''}{c:.2f}%\")")
          VOL=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin)['bitcoin']; print(f\"{d['usd_24h_vol']/1e9:.1f}B\")")
          MCAP=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin)['bitcoin']; print(f\"{d['usd_market_cap']/1e12:.2f}T\")")
          DATE=$(date -u '+%d %B %Y')
          MSG="🔸 *Gunluk Bitcoin Raporu*
          📅 ${DATE} — 06:00 GMT

          💰 *BTC/USD:* \$${PRICE}
          📈 *24s Degisim:* ${CHANGE}
          📊 *24s Hacim:* \$${VOL}
          🏆 *Piyasa Degeri:* \$${MCAP}

          _kaynak: CoinGecko_"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode="Markdown"
